name: HF Space Keep-Alive

on:
  schedule:
    - cron: "0 0 * * *"  # Runs every day at midnight (well before 48h inactivity)
  workflow_dispatch:     # Allows manual trigger

jobs:
  ping_space:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to HF Space
        run: |
          curl -X POST \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"event": {"action": "ping"}, "repo": {"name": "setrsoft/climbing-holds"}}' \
            https://setrsoft-climbing-holds-dataset-indexer.hf.space/webhooks/indexation
