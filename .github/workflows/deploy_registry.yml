name: Deploy SetterSoft Registry

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy_registry.yml"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"
      - "src/**"
      - "public/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Base path for GitHub Pages. Override with var or secret if needed.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || secrets.VITE_BASE_PATH || '/holds-dataset-hub/' }}
          # Repository variables (Settings → Actions → Variables) or secrets
          VITE_HF_DATASET_REPO_ID: ${{ vars.VITE_HF_DATASET_REPO_ID || secrets.VITE_HF_DATASET_REPO_ID }}
          VITE_HF_REVISION: ${{ vars.VITE_HF_REVISION || secrets.VITE_HF_REVISION }}
          VITE_HF_ANONYMOUS_REPO_ID: ${{ vars.VITE_HF_ANONYMOUS_REPO_ID || secrets.VITE_HF_ANONYMOUS_REPO_ID }}
          VITE_HF_ANONYMOUS_TOKEN: ${{ vars.VITE_HF_ANONYMOUS_TOKEN || secrets.VITE_HF_ANONYMOUS_TOKEN }}
          VITE_VOTE_WEBHOOK_URL: ${{ vars.VITE_VOTE_WEBHOOK_URL || secrets.VITE_VOTE_WEBHOOK_URL }}
          VITE_VOTE_WEBHOOK_SECRET: ${{ vars.VITE_VOTE_WEBHOOK_SECRET || secrets.VITE_VOTE_WEBHOOK_SECRET }}
        run: npm run build

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
